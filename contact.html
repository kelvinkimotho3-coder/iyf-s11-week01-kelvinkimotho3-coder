<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Task 2.2</title>
    <style>
        /* Optional basic styling to make your form look clean and organized */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }
        fieldset {
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        legend {
            font-weight: bold;
            padding: 0 10px;
            font-size: 1.2rem;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-group label {
            display: inline;
            margin-bottom: 0;
            font-weight: normal;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .required-star {
            color: red;
        }
    </style>
</head>
<body>

    <h1>Contact Us</h1>
    <p>Please fill out the form below to get in touch with our team.</p>

    <form action="#" method="POST">
        <!-- Fieldset and Legend used to group related contact fields safely -->
        <fieldset>
            <legend>Your Message Details</legend>

            <!-- Full Name (text input, required) -->
            <div class="form-group">
                <label for="full-name">Full Name <span class="required-star">*</span></label>
                <input 
                    type="text" 
                    id="full-name" 
                    name="fullName" 
                    placeholder="Enter your full name" 
                    required
                >
            </div>

            <!-- Email (email input, required, with validation) -->
            <div class="form-group">
                <label for="email">Email Address <span class="required-star">*</span></label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="example@domain.com" 
                    required
                >
            </div>

            <!-- Phone (tel input, optional) -->
            <div class="form-group">
                <label for="phone">Phone Number (Optional)</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="e.g., +254 700 000000"
                >
            </div>

            <!-- Subject (dropdown select with 3 options) -->
            <div class="form-group">
                <label for="subject">Subject <span class="required-star">*</span></label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>Select a topic...</option>
                    <option value="general">General Inquiry</option>
                    <option value="support">Technical Support</option>
                    <option value="feedback">Feedback / Suggestions</option>
                </select>
            </div>

            <!-- Message (textarea, required, min 50 characters) -->
            <div class="form-group">
                <label for="message">Message <span class="required-star">*</span> (Minimum 50 characters)</label>
                <textarea 
                    id="message" 
                    name="message" 
                    rows="6" 
                    minlength="50" 
                    placeholder="Type your message here... (Must be at least 50 characters long)" 
                    required
                ></textarea>
            </div>

            <!-- Newsletter subscription (checkbox) -->
            <div class="form-group checkbox-group">
                <input type="checkbox" id="newsletter" name="newsletter" value="subscribe">
                <label for="newsletter">Subscribe to our weekly newsletter</label>
            </div>

        </fieldset>

        <!-- Submit button -->
        <button type="submit">Submit Form</button>
    </form>

</body>
</html>
